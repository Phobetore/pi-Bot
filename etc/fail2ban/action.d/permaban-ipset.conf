# fail2ban action that adds the offender to the persistent ipset
# `sirrmizan-permaban`. The ipset itself is created at boot by
# sirrmizan-ipset-restore.service and its content is saved on every
# add via the helper script below. This is used by the [recidive]
# jail to make repeat-offender bans survive reboots and fail2ban
# restarts (regular jails still use the default temporary iptables
# ban).

[Definition]
actionstart =
actionstop =
actionflush =
actionban = ipset add sirrmizan-permaban <ip> -exist
            /usr/local/bin/sirrmizan-ipset-save.sh sirrmizan-permaban
actionunban = ipset del sirrmizan-permaban <ip> -exist
              /usr/local/bin/sirrmizan-ipset-save.sh sirrmizan-permaban

[Init]
name = default
