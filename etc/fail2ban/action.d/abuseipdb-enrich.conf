# fail2ban action that enriches each ban with AbuseIPDB metadata and
# emits a high-priority Discord alert when the IP scores ≥90 confidence
# or appears from a country we haven't seen attack us before. The actual
# ban (iptables drop) is done by the default action; this one only
# observes and logs.
#
# Args: <ip> <jail>

[Definition]
actionban = /usr/local/bin/sirrmizan-abuseipdb.sh enrich <ip> <name>
actionunban =
actionstart =
actionstop =
actionflush =

[Init]
name = default
