name: Deploy to production

on:
  workflow_run:
    workflows: ["CI"]
    branches: [prod]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

# Only one deploy at a time. Queued (not cancelled) so a fast follow-up
# commit waits for the previous deploy to finish.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # The "production" environment can carry required reviewers, secrets,
    # and a deployment-branches restriction. See branch-protection notes
    # in the README.
    environment:
      name: production
      url: https://github.com/${{ github.repository }}
    # Only deploy when the upstream CI run was successful (or when the
    # deploy was kicked off manually with workflow_dispatch).
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'prod')

    steps:
      - name: Resolve commit being deployed
        id: commit
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run remote deploy
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # The forced-command in authorized_keys runs ci_deploy.sh and
          # ignores anything we'd pass; we just open the connection.
          ssh -i ~/.ssh/deploy_key \
              -o BatchMode=yes \
              -o StrictHostKeyChecking=yes \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              "${DEPLOY_USER}@${DEPLOY_HOST}"

      - name: Summary
        run: |
          echo "### Deployed \`${{ steps.commit.outputs.sha }}\` to production" \
            >> "$GITHUB_STEP_SUMMARY"
