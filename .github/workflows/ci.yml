name: CI

on:
  push:
    branches: [dev, prod]
  pull_request:
    branches: [dev, prod]
  workflow_dispatch:

# Read-only by default. Specific jobs widen permissions if they need to.
permissions:
  contents: read

# A new run on the same ref cancels in-flight CI jobs (saves minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check sirrmizan tests

      - name: Ruff format check
        run: ruff format --check sirrmizan tests

      - name: Mypy
        run: mypy sirrmizan

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Pytest with coverage
        run: pytest --cov=sirrmizan --cov-report=term-missing --cov-report=xml -ra

      - name: Upload coverage (3.11 only)
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  security:
    name: Security scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks needs the full history to scan past commits.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install scanners
        run: pip install bandit pip-audit

      - name: Bandit (SAST)
        # -ll: only report Medium+ severity, -ii: only Medium+ confidence.
        run: bandit -r sirrmizan -ll -ii

      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements.txt --strict

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
